<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery | DianaMik</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/gallery/gallery.css" />
  </head>

  <body>
    <div id="header"></div>

    <!-- ====== GALLERY SECTION ====== -->
    <section id="gallery" class="gallery-section">
      <div class="container">
        <div class="gallery__header">
          <span class="gallery__badge">Achievements</span>
          <h2 class="gallery__title">Awards & Certificates</h2>
          <p class="gallery__subtitle">
            Recognitions and certifications that reflect our unwavering commitment to excellence in healthcare.
          </p>
        </div>
        <div class="masonry-grid" id="certificates-grid" style="margin-bottom: 4rem;"></div>

        <div class="gallery__header">
          <span class="gallery__badge">Our Work</span>
          <h2 class="gallery__title">Gallery</h2>
          <p class="gallery__subtitle">
            Explore our projects, hospital setups, accreditation milestones, and
            consulting highlights.
          </p>
        </div>

        <div class="masonry-grid" id="gallery-grid"></div>
      </div>
    </section>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox">
      <span class="close">&times;</span>
      <img class="lightbox-img" id="lightbox-img" />
    </div>
    <div id="footer"></div>
    <script src="/js/include.js"></script>
    <script src="/js/script.js"></script>
    <script src="/gallery/gallery.js"></script>
  </body>
</html>
